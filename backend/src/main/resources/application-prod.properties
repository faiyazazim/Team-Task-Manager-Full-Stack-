# Production profile — loaded on Railway via SPRING_PROFILES_ACTIVE=prod
# All sensitive values come from Railway environment variables

spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/project_manager?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:123459}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false

jwt.secret=${JWT_SECRET:ProjectManagerSecretKey2024VeryLongAndSecureKeyForJWTTokenGeneration}
jwt.expiration=${JWT_EXPIRATION:86400000}

server.port=${PORT:8080}
